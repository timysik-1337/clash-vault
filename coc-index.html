<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoC Gold Shop</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: sans-serif;
            background-color: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            display: flex; flex-direction: column; align-items: center; padding: 20px;
        }
        .card {
            background: var(--tg-theme-secondary-bg-color);
            border-radius: 12px; padding: 15px; margin: 10px;
            width: 90%; border: 1px solid #gold; text-align: center;
        }
        button {
            background: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
            border: none; border-radius: 8px; padding: 10px 20px; cursor: pointer;
        }
    </style>
</head>
<body>
    <h2>Золото Столицы (CoC)</h2>
    
    <div class="card">
        <h3>5,000 Золота</h3>
        <p>Цена: 150₽</p>
        <button onclick="buy(5000, 150)">Купить</button>
    </div>

    <div class="card">
        <h3>10,000 Золота</h3>
        <p>Цена: 280₽</p>
        <button onclick="buy(10000, 280)">Купить</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Развернуть на весь экран

        function buy(amount, price) {
            // Отправляем данные боту и закрываем окно
            const data = {
                item: "Золото Столицы",
                amount: amount,
                price: price
            };
            tg.sendData(JSON.stringify(data)); 
        }
    </script>
</body>
</html>
